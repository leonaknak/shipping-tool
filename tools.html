<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨境工具箱 | Haiketool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: #fff;
  }
  .header {
    text-align: center;
    margin-bottom: 56px;
  }
  .header .logo {
    font-size: 42px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    margin-top: 10px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 1px;
  }
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    width: 100%;
    max-width: 960px;
  }
  .tool-card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 36px 28px;
    text-decoration: none;
    color: #fff;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .tool-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tool-card.purple::before { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(99,102,241,0.1)); }
  .tool-card.blue::before   { background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(34,211,238,0.1)); }
  .tool-card.green::before  { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(52,211,153,0.1)); }
  .tool-card:hover::before  { opacity: 1; }
  .tool-card:hover {
    transform: translateY(-6px);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .tool-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }
  .tool-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .tool-card p {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }
  .tool-tag {
    display: inline-block;
    margin-top: 16px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .tool-card.purple .tool-tag { background: rgba(139,92,246,0.25); color: #c4b5fd; }
  .tool-card.blue .tool-tag   { background: rgba(59,130,246,0.25); color: #93c5fd; }
  .tool-card.green .tool-tag  { background: rgba(16,185,129,0.25); color: #6ee7b7; }
  .arrow {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    opacity: 0.3;
    transition: all 0.3s;
  }
  .tool-card:hover .arrow { opacity: 0.8; transform: translateY(-50%) translateX(4px); }
  .footer {
    margin-top: 56px;
    color: rgba(255,255,255,0.2);
    font-size: 12px;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🧰</div>
  <h1>跨境工具箱</h1>
  <p>CROSS-BORDER TOOLKIT · FOR GLOBAL SELLERS</p>
</div>

<div class="tools-grid">
  <a class="tool-card purple" href="./index.html">
    <span class="tool-icon">🚢</span>
    <h2>头程物流工具</h2>
    <p>头程均价计算器 + 货件追踪器<br>KG/CBM计费，货件全流程管理</p>
    <span class="tool-tag">物流管理</span>
    <span class="arrow">→</span>
  </a>

  <a class="tool-card blue" href="./currency-converter.html">
    <span class="tool-icon">💱</span>
    <h2>实时汇率换算</h2>
    <p>多币种实时汇率，USD / EUR / GBP / JPY 等主流币种，跨境报价必备</p>
    <span class="tool-tag">汇率换算</span>
    <span class="arrow">→</span>
  </a>

  <a class="tool-card green" href="./world-clock.html">
    <span class="tool-icon">🌍</span>
    <h2>世界时间</h2>
    <p>全球多时区同步显示，掌握海外买家当地时间，安排发货和对接</p>
    <span class="tool-tag">时区管理</span>
    <span class="arrow">→</span>
  </a>
</div>

<div class="footer">© 2026 跨境工具箱 · 数据加密存储 · 安全可靠</div>

</body>
</html>
